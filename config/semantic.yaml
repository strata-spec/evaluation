            - '"La Pasión de Cristo" es una controvertida película sobre el último día de la vida de Jesucristo. El director Mel Gibson fue criticado por las representaciones explícitas de violencia y dividió al público. Por parte judía, Gibson, católico, fue acusado de antisemitismo. La película cuenta con actores laicos y está rodada en arameo, latín y hebreo.'
            - '"La chaqueta metálica" (en inglés: Full Metal Jacket") es una obra tardía de Kubrick. La película aborda el tema de la guerra de Vietnam y plantea la cuestión del embrutecimiento del hombre en la guerra. Muestra el entrenamiento de los marines estadounidenses y su posterior y sangriento despliegue en Vietnam.'
            - '"Las chicas de oro" es una comedia de situación sobre cuatro mujeres mayores que viven juntas en un piso compartido. Con mucho humor, se tratan diversos temas socialmente críticos, como la homosexualidad, el sida o la pobreza. Hubo un total de 7 temporadas (1985-1992), pero la secuela "Golden Palace" (El hotel de oro), que tuvo que prescindir de Beatrice Arthur como Dorothy, fracasó.'
            - '"Los Amantes" (Brokeback Mountain) es la película de mayor éxito del director Ang Lee hasta la fecha. Está basada en el relato homónimo de Annie Proulx y narra la trágica historia de amor de dos vaqueros en la mojigata América de los años sesenta. El western desencadenó un polémico debate social sobre el tema de la homosexualidad, especialmente en Estados Unidos.'
            - '"Los Chicos del Barrio" es la popular y exitosa película y crítica social de John Singleton sobre las condiciones en el centro sur de Los Ángeles, donde los adolescentes están involucrados en tiroteos y tráfico de drogas a diario.'
            - '"Los ríos de color púrpura" (título original: Les Rivières pourpres) es un thriller francés del año 2000 de Mathieu Kassovitz protagonizado por Jean Reno y Vincent Cassel sobre dos policías en busca de un asesino en serie. El guión fue escrito por Jean-Christophe Grangé a partir de su novela homónima.'
            - '"Madres & hijas" nos habla de la importancia del vínculo entre madres e hijos, a través de la historia de tres mujeres: Karen, que dio a su hija en adopción cuando tenía 14 años y de la que no ha vuelto a saber nada. Elizabeth, su hija, que es ahora una abogada que lucha contra sus propios problemas de familia y amor, y Lucy, que quiere adoptar a un niño.'
            - '"Mi Idaho privado" (My Own Private Idaho) está considerada una obra maestra del cineasta independiente Gus Van Sant, que incorpora numerosas referencias culturales a su obra. River Phoenix y Keanu Reeves en una película que se ha convertido en culto y los ha convertido en iconos del cine gay.'
            - |
              "Naruto Shippuden" es la secuela directa de la serie de anime de éxito mundial "Naruto". El protagonista es el joven ninja Naruto, de quien se sigue el camino hasta convertirse en adulto y en el ninja supremo de su aldea. La trama se desarrolla en un mundo ficticio, retratado principalmente desde el punto de vista de los ninjas de la aldea de Konoha-Gakure.\
              \
            - '"Perdición" es un thriller de cine negro de 1944 de Billy Wilder en el que los protagonistas ponen en práctica una estafa al seguro. El agente de seguros Walter Neff conoce a Phyllis Dietrichson, a quien le gustaría librarse de su marido. Planean un asesinato haciéndolo pasar por un accidente para cobrar el seguro.'
            - '"Primera plana" (The Front Page) es una comedia de 1974 de Billy Wilder protagonizada por Jack Lemmon, Walter Matthau y Susan Sarandon. El periodista Johnson sufre el síndrome del quemado y quiere dejar su trabajo para siempre, pero eso no le gusta tanto a su jefe...'
            - '"Salò", 1944, poco antes del final de la dictadura de Mussolini: un grupo de "intelectuales" sádicos torturan violentamente a jóvenes secuestrados con rituales crueles y perversos. La película de Pasolini, muy controvertida, es un ajuste de cuentas con el fascismo y, al mismo tiempo, una crítica a la sociedad de consumo. La versión sin cortes sigue estando prohibida en muchos países.'
