questions:
  # ──────────────────────────────────────────────
  # SIMPLE — single table, self-evident columns
  # ──────────────────────────────────────────────

  - id: "q001"
    tier: simple
    natural_language: "How many people are recorded in the database?"
    reference_sql: "SELECT COUNT(*) FROM people"
    notes: "Single table COUNT. 'people' is the only person table, column-free. Both conditions should ace this."

  - id: "q002"
    tier: simple
    natural_language: "What are the distinct kinds of entries in the movies table?"
    reference_sql: "SELECT DISTINCT kind FROM movies ORDER BY kind"
    notes: "Single table DISTINCT on the kind enum column. Self-evident column name, no filter needed."

  - id: "q003"
    tier: simple
    natural_language: "How many trailers are stored in the database?"
    reference_sql: "SELECT COUNT(*) FROM trailers"
    notes: "Single table COUNT. 'trailers' is unambiguous — no other table stores trailer data."

  - id: "q004"
    tier: simple
    natural_language: "How many movie-to-movie references are recorded?"
    reference_sql: "SELECT COUNT(*) FROM movie_references"
    notes: "Single table COUNT on small junction table (1208 rows). Unambiguous table name."

  - id: "q005"
    tier: simple
    natural_language: "How many entries in the movies table have a runtime greater than zero?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE runtime > 0"
    notes: "Single table with simple numeric filter. runtime column name is self-evident."

  # ──────────────────────────────────────────────
  # AMBIGUOUS — column/table name maps to multiple candidates
  # ──────────────────────────────────────────────

  - id: "q006"
    tier: ambiguous
    natural_language: "How many distinct roles appear in the cast credits?"
    reference_sql: "SELECT COUNT(DISTINCT role) FROM casts WHERE role != ''"
    notes: "casts.role stores the CHARACTER NAME ('Luke Skywalker'), not the job function. 'Role' in English naturally means job function (Director, Actor), which would be COUNT(DISTINCT job_id) = 571. Correct answer is COUNT(DISTINCT role) = 357,355. Agent must know role = character name. Strata column description should clarify."

  - id: "q007"
    tier: ambiguous
    natural_language: "How many movies are in the database?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE kind = 'movie'"
    notes: "The movies table (211,718 rows) contains episodes (135K), seasons (9.6K), series (4.3K), and movieseries (1.2K) alongside actual movies (60,579). kind is a USER-DEFINED enum — values are NOT visible in CREATE TABLE DDL. Without semantic context, COUNT(*) FROM movies (211K) is the obvious query. Strata model description should clarify the kind enum."

  - id: "q008"
    tier: ambiguous
    natural_language: "How many entries in the movies table belong to a series?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE series_id IS NOT NULL"
    notes: "movies has two self-referential FKs: parent_id (episode→season, season→series) and series_id (direct link to root series). 'Belong to a series' maps to series_id (135,791 entries). parent_id gives 151,096 (includes seasons whose parent is also a series). kind='series' gives 4,305 (misinterpret as 'how many ARE series'). All three produce valid-looking results. Strata column descriptions should distinguish parent_id vs series_id semantics."

  - id: "q009"
    tier: ambiguous
    natural_language: "What are the different types of cross-references between movies?"
    reference_sql: "SELECT DISTINCT type FROM movie_references ORDER BY type"
    notes: "movie_references.type has 5 values: Homage, Influence, Parody, Remake, SpinOff. movies.kind also has 5 values: episode, movie, movieseries, season, series. 'Types of cross-references between movies' should mean movie_references.type, but agent may parse it as 'types of movies that cross-reference' and return movies.kind. Both return exactly 5 rows — row count won't reveal the error. Strata model descriptions should clarify movie_references stores inter-movie relationships."

  - id: "q010"
    tier: ambiguous
    natural_language: "How many movies have been tagged with at least one keyword?"
    reference_sql: "SELECT COUNT(DISTINCT movie_id) FROM movie_keywords"
    notes: "movie_keywords and movie_categories have IDENTICAL structure: (movie_id bigint, category_id bigint) with FKs to movies and categories. Both 'tag' movies via the categories table. movie_keywords = descriptive terms (50,511 movies), movie_categories = genre/source/class/standing labels (71,083 movies). 'Tagged with a keyword' maps to movie_keywords, but an agent seeing two structurally identical junction tables may pick movie_categories. Strata descriptions should differentiate the two."

  # ──────────────────────────────────────────────
  # MULTI-TABLE — requires joining 2+ tables, join key not named
  # ──────────────────────────────────────────────

  - id: "q011"
    tier: multi_table
    natural_language: "How many movies are categorized under the Drama genre?"
    reference_sql: "SELECT COUNT(DISTINCT mc.movie_id) FROM movie_categories mc JOIN categories c ON mc.category_id = c.id WHERE c.name = 'Drama'"
    notes: "Requires movie_categories JOIN categories on category_id = id. Agent must infer the join key. Wrong join on root_id or parent_id produces incorrect results rather than an error."

  - id: "q012"
    tier: multi_table
    natural_language: "How many distinct people have been credited as Director?"
    reference_sql: "SELECT COUNT(DISTINCT c.person_id) FROM casts c JOIN jobs j ON c.job_id = j.id WHERE j.name = 'Director'"
    notes: "Requires casts JOIN jobs on job_id = id. Agent must infer the join key. 'Director' exists as jobs.name (id=21). Agent might try to filter casts.role instead of joining jobs."

  - id: "q013"
    tier: multi_table
    natural_language: "How many English-language abstracts exist for movies released before the year 2000?"
    reference_sql: "SELECT COUNT(*) FROM movie_abstracts_en a JOIN movies m ON a.movie_id = m.id WHERE m.date < '2000-01-01'"
    notes: "Requires movie_abstracts_en JOIN movies on movie_id = id. Date filter forces the join — abstract table has no date column. Agent must select the correct abstract table (en, not de/es/fr)."

  - id: "q014"
    tier: multi_table
    natural_language: "What are the 10 most commonly assigned keywords for movies?"
    reference_sql: "SELECT c.name, COUNT(*) as cnt FROM movie_keywords mk JOIN categories c ON mk.category_id = c.id GROUP BY c.name ORDER BY cnt DESC LIMIT 10"
    notes: "Requires movie_keywords JOIN categories on category_id = id. Keywords are stored in the categories tree under root_id=8 (Keyword). Agent might confuse movie_keywords with movie_categories (genres) since both reference the categories table."

  - id: "q015"
    tier: multi_table
    natural_language: "How many distinct people have cast credits in movies released after 2010?"
    reference_sql: "SELECT COUNT(DISTINCT c.person_id) FROM casts c JOIN movies m ON c.movie_id = m.id WHERE m.date >= '2011-01-01'"
    notes: "Requires casts JOIN movies on movie_id = id. Date filter forces the join — casts has no date column. Tests the most common FK relationship in the schema."

  # ──────────────────────────────────────────────
  # METRIC — correct business-concept-to-column mapping
  # ──────────────────────────────────────────────

  - id: "q016"
    tier: metric
    natural_language: "What are the 10 highest-rated movies by average vote score?"
    reference_sql: "SELECT name, vote_average FROM movies WHERE vote_average IS NOT NULL AND vote_average > 0 AND kind = 'movie' ORDER BY vote_average DESC LIMIT 10"
    notes: "'Highest rated' maps to vote_average (quality score, 1-10 scale), not votes_count (popularity count). Agent must choose the correct measure. kind='movie' filter excludes episodes/seasons."

  - id: "q017"
    tier: metric
    natural_language: "What are the 10 most-voted-on movies?"
    reference_sql: "SELECT name, votes_count FROM movies WHERE votes_count IS NOT NULL AND votes_count > 0 AND kind = 'movie' ORDER BY votes_count DESC LIMIT 10"
    notes: "'Most voted on' maps to votes_count (number of votes cast), not vote_average (score). Tests inverse of q016. votes_count max is only 204 (OMDB community votes, not IMDb)."

  - id: "q018"
    tier: metric
    natural_language: "What are the 10 movies with the largest production budget?"
    reference_sql: "SELECT name, budget FROM movies WHERE budget IS NOT NULL AND budget > 0 AND kind = 'movie' ORDER BY budget DESC LIMIT 10"
    notes: "'Largest budget' maps to budget column (production cost), not revenue (box office). Both are numeric financial columns on the same table. Agent must distinguish cost from earnings."

  - id: "q019"
    tier: metric
    natural_language: "What are the 10 highest-grossing movies by revenue?"
    reference_sql: "SELECT name, revenue FROM movies WHERE revenue IS NOT NULL AND revenue > 0 AND kind = 'movie' ORDER BY revenue DESC LIMIT 10"
    notes: "'Highest-grossing' / 'revenue' maps to revenue column (box office), not budget (production cost). Tests inverse of q018."

  - id: "q020"
    tier: metric
    natural_language: "Which 10 movies have the longest running time?"
    reference_sql: "SELECT name, runtime FROM movies WHERE runtime IS NOT NULL AND runtime > 0 AND kind = 'movie' ORDER BY runtime DESC LIMIT 10"
    notes: "'Longest running time' maps to runtime (integer, minutes) on movies. runtime also exists on access_log (page load time in seconds, different data type and semantics) and casts_view (denormalized copy). Agent must select movies.runtime."

  # ──────────────────────────────────────────────
  # GOTCHA — obvious column/table is wrong for non-obvious reason
  # ──────────────────────────────────────────────

  - id: "q021"
    tier: gotcha
    natural_language: "How many female people are recorded in the database?"
    reference_sql: "SELECT COUNT(*) FROM people WHERE gender = 1"
    notes: "gender is stored as integer (0=male, 1=female, 2=non-binary, NULL=unknown), not text. Agent without semantic context will try WHERE gender = 'female' or WHERE gender = 'F' which fails on type mismatch. Strata's column description should specify the integer encoding."

  - id: "q022"
    tier: gotcha
    natural_language: "How many movies have a homepage URL?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE homepage IS NOT NULL AND homepage != ''"
    notes: "homepage column contains ~57K empty strings that are NOT NULL. Naive WHERE homepage IS NOT NULL returns 60579 instead of the correct 3141. Agent must know that empty strings are prevalent and filter them. Strata should note the empty-string pattern."

  - id: "q023"
    tier: gotcha
    natural_language: "How many distinct movie genres exist in the database?"
    reference_sql: "SELECT COUNT(*) FROM categories WHERE root_id = 1 AND id != 1"
    notes: "categories table is a hierarchical tree with 9 roots (Genre, Source, Class, Standing, Keyword, etc.). Genres are only under root_id=1. Naive COUNT(*) FROM categories returns 14683 (all types). Agent must understand the tree structure and filter to the Genre subtree (213 genres)."

  - id: "q024"
    tier: gotcha
    natural_language: "How many screenplay credits exist in the cast entries?"
    reference_sql: "SELECT COUNT(*) FROM casts c JOIN jobs j ON c.job_id = j.id WHERE j.name = 'Drehbuch'"
    notes: "The screenplay job is stored under the German name 'Drehbuch' (job_id=100) — OMDB is German-origin. Even the English row in job_names says 'Drehbuch'. Agent searching for 'Screenwriter', 'Screenplay', or 'Writer' finds nothing or the wrong job. Strata should describe the job meaning."

  - id: "q025"
    tier: gotcha
    natural_language: "How many images in the database are associated with movies?"
    reference_sql: "SELECT COUNT(*) FROM image_ids WHERE object_type = 'Movie'"
    notes: "image_ids stores images for multiple object types: Movie (38665), Person (8131), Category, Character, User, Company, etc. Without filtering object_type='Movie', agent gets 47414. The value is capitalized singular 'Movie', not 'movie' or 'movies' — case mismatch causes zero results."

  # ──────────────────────────────────────────────
  # SIMPLE (ADDITIONAL) — single table, semantic filter hints required
  # ──────────────────────────────────────────────

  - id: "q026"
    tier: simple
    natural_language: "How many entries in the movies table are episodes?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE kind = 'episode'"
    notes: "kind is an enum-like field in movies with values not obvious from plain DDL. Semantic context is needed to map the natural language concept 'episodes' to kind='episode'."

  - id: "q027"
    tier: simple
    natural_language: "How many entries in the movies table are seasons?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE kind = 'season'"
    notes: "Same semantic pattern as q026: requires correct mapping from natural language type to movies.kind enum value."

  - id: "q028"
    tier: simple
    natural_language: "How many officially translated movie titles are stored?"
    reference_sql: "SELECT COUNT(*) FROM movie_aliases_iso WHERE official_translation = 1"
    notes: "official_translation is stored as integer 0/1, not boolean TRUE/FALSE. Semantic layer must supply the encoding detail to avoid type/value mistakes."

  - id: "q029"
    tier: simple
    natural_language: "How many unofficial movie title translations are stored?"
    reference_sql: "SELECT COUNT(*) FROM movie_aliases_iso WHERE official_translation = 0"
    notes: "Inverse of q028. Requires semantic mapping of integer-encoded official_translation where 0 means unofficial translation."

  - id: "q030"
    tier: simple
    natural_language: "How many image records are for movies?"
    reference_sql: "SELECT COUNT(*) FROM image_ids WHERE object_type = 'Movie'"
    notes: "object_type uses exact case-sensitive enum-like strings (e.g., 'Movie'). Lowercase variants can produce wrong results. Semantic context should expose canonical values."

  # ──────────────────────────────────────────────
  # AMBIGUOUS (ADDITIONAL) — multiple plausible tables/columns
  # ──────────────────────────────────────────────

  - id: "q031"
    tier: ambiguous
    natural_language: "How many movies have titles starting with 'The'?"
    reference_sql: "SELECT COUNT(*) FROM movies WHERE kind = 'movie' AND name ILIKE 'The %'"
    notes: "Ambiguity: movies.name (canonical title) vs movie_aliases_iso.name (localized aliases). Correct target here is canonical movie titles with kind='movie'."

  - id: "q032"
    tier: ambiguous
    natural_language: "How many categories are defined in the system?"
    reference_sql: "SELECT COUNT(*) FROM categories"
    notes: "Ambiguity: categories vs category_names. Both look like 'category definitions', but categories is the canonical hierarchy table while category_names holds localized names."

  - id: "q033"
    tier: ambiguous
    natural_language: "How many distinct job names exist?"
    reference_sql: "SELECT COUNT(DISTINCT name) FROM jobs"
    notes: "Ambiguity: jobs.name (canonical, sometimes non-English) vs job_names.name (localized variants by language). Correct reference uses canonical jobs table."

  - id: "q034"
    tier: ambiguous
    natural_language: "How many people have image records?"
    reference_sql: "SELECT COUNT(*) FROM image_ids WHERE object_type = 'Person'"
    notes: "Ambiguity: people table contains people entities, but image association is tracked in image_ids by object_type/object_id. Correct interpretation counts person image records in image_ids."

  - id: "q035"
    tier: ambiguous
    natural_language: "How many English movie titles are stored?"
    reference_sql: "SELECT COUNT(*) FROM movie_aliases_iso WHERE language = 'en'"
    notes: "Ambiguity: movies.name can be interpreted as title text, but language-scoped title variants are in movie_aliases_iso. 'English titles' maps to aliases with language='en'."

  # ──────────────────────────────────────────────
  # MULTI-TABLE (ADDITIONAL) — one-hop joins required
  # ──────────────────────────────────────────────

  - id: "q036"
    tier: multi_table
    natural_language: "How many cast credits are attached to episode entries?"
    reference_sql: "SELECT COUNT(*) FROM casts c JOIN movies m ON c.movie_id = m.id WHERE m.kind = 'episode'"
    notes: "One-hop join path: casts.movie_id -> movies.id. Requires semantic interpretation of episode membership via movies.kind enum, not table naming alone."

  - id: "q037"
    tier: multi_table
    natural_language: "How many cast credits are for directors with a non-empty character field?"
    reference_sql: "SELECT COUNT(*) FROM casts c JOIN jobs j ON c.job_id = j.id WHERE j.name = 'Director' AND c.role != ''"
    notes: "One-hop join path: casts.job_id -> jobs.id. Requires semantic context that Director is in jobs.name and that casts.role is character text, often empty for non-acting credits."

  - id: "q038"
    tier: multi_table
    natural_language: "What are the 10 most assigned genres across movies?"
    reference_sql: "SELECT c.name, COUNT(*) AS cnt FROM movie_categories mc JOIN categories c ON mc.category_id = c.id WHERE c.root_id = 1 AND c.id != 1 GROUP BY c.name ORDER BY cnt DESC LIMIT 10"
    notes: "One-hop join path: movie_categories.category_id -> categories.id. Genre filtering requires semantic knowledge of category hierarchy where root_id=1 denotes Genre."

  - id: "q039"
    tier: multi_table
    natural_language: "How many title aliases belong to entries that are actual movies?"
    reference_sql: "SELECT COUNT(*) FROM movie_aliases_iso a JOIN movies m ON a.movie_id = m.id WHERE m.kind = 'movie'"
    notes: "One-hop join path: movie_aliases_iso.movie_id -> movies.id. Requires semantic disambiguation of movies.kind values to isolate true movies from episodes/seasons/series."

  - id: "q040"
    tier: multi_table
    natural_language: "How many keyword assignments are attached to movies released from 2010 onward?"
    reference_sql: "SELECT COUNT(*) FROM movie_keywords mk JOIN movies m ON mk.movie_id = m.id WHERE m.date >= '2010-01-01'"
    notes: "One-hop join path: movie_keywords.movie_id -> movies.id. Release date filter lives only on movies, forcing join and requiring semantic selection of movie_keywords (not movie_categories)."

  # ──────────────────────────────────────────────
  # METRIC (ADDITIONAL) — concept-to-measure mapping
  # ──────────────────────────────────────────────

  - id: "q041"
    tier: metric
    natural_language: "What are the 10 lowest-rated movies by average vote score?"
    reference_sql: "SELECT name, vote_average FROM movies WHERE kind = 'movie' AND vote_average IS NOT NULL AND vote_average > 0 ORDER BY vote_average ASC LIMIT 10"
    notes: "Uses vote_average as the quality metric and inverts direction (lowest rather than highest). Semantic layer still needs to differentiate score (vote_average) from volume (votes_count)."

  - id: "q042"
    tier: metric
    natural_language: "What are the 10 movies with the highest number of votes?"
    reference_sql: "SELECT name, votes_count FROM movies WHERE kind = 'movie' AND votes_count IS NOT NULL AND votes_count > 0 ORDER BY votes_count DESC LIMIT 10"
    notes: "'Highest number of votes' maps to votes_count, not popularity or vote_average. Tests metric intent disambiguation on same table."

  - id: "q043"
    tier: metric
    natural_language: "Among frequently voted movies, which 10 have the best average rating?"
    reference_sql: "SELECT name, vote_average FROM movies WHERE kind = 'movie' AND vote_average IS NOT NULL AND vote_average > 0 AND votes_count >= 50 ORDER BY vote_average DESC LIMIT 10"
    notes: "Requires combining quality metric (vote_average) with support threshold (votes_count >= 50). Without semantic cues, models often optimize the wrong metric."

  - id: "q044"
    tier: metric
    natural_language: "What are the 10 movies with the largest gross margin (revenue minus budget)?"
    reference_sql: "SELECT name, (revenue - budget) AS gross_margin FROM movies WHERE kind = 'movie' AND revenue IS NOT NULL AND budget IS NOT NULL AND revenue > 0 AND budget > 0 ORDER BY gross_margin DESC LIMIT 10"
    notes: "Business metric composition: gross margin is derived from revenue and budget. Semantic descriptions must distinguish cost and earnings measures."

  - id: "q045"
    tier: metric
    natural_language: "Which 10 pre-1980 movies have the longest runtime?"
    reference_sql: "SELECT name, runtime FROM movies WHERE kind = 'movie' AND runtime IS NOT NULL AND runtime > 0 AND date < '1980-01-01' ORDER BY runtime DESC LIMIT 10"
    notes: "Runtime ranking with temporal constraint uses movies.runtime and movies.date. Semantic layer helps avoid similarly named runtime-like fields in non-movie contexts."

  # ──────────────────────────────────────────────
  # GOTCHA (ADDITIONAL) — obvious query is subtly wrong
  # ──────────────────────────────────────────────

  - id: "q046"
    tier: gotcha
    natural_language: "How many non-binary people are recorded in the database?"
    reference_sql: "SELECT COUNT(*) FROM people WHERE gender = 2"
    notes: "gender is integer-coded (0/1/2), so text filters like gender='non-binary' fail. Semantic context must expose categorical encoding."

  - id: "q047"
    tier: gotcha
    natural_language: "How many people have unknown gender in the data?"
    reference_sql: "SELECT COUNT(*) FROM people WHERE gender IS NULL"
    notes: "Unknown gender is NULL, not a numeric code. Naive filters like gender = 0 or empty-string checks are incorrect."

  - id: "q048"
    tier: gotcha
    natural_language: "How many image records use the lowercase movie object type token?"
    reference_sql: "SELECT COUNT(*) FROM image_ids WHERE object_type = 'movie'"
    notes: "object_type values are case-sensitive; canonical movie token is 'Movie'. This deliberately tests case-sensitive categorical assumptions."

  - id: "q049"
    tier: gotcha
    natural_language: "How many genre-category nodes exist including the root genre node?"
    reference_sql: "SELECT COUNT(*) FROM categories WHERE root_id = 1"
    notes: "Hierarchical categories include root and descendants. Questions that do not explicitly exclude root differ from the common 'leaf genre count' interpretation."

  - id: "q050"
    tier: gotcha
    natural_language: "How many cast credits are tagged as screenplay work?"
    reference_sql: "SELECT COUNT(*) FROM casts c JOIN jobs j ON c.job_id = j.id WHERE j.name = 'Drehbuch'"
    notes: "Screenplay is represented by German canonical job label 'Drehbuch', not English synonyms. Without semantic mapping, models miss the intended job identifier."