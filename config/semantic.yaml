domain:
    name: Movie Database
    description: This is a comprehensive movie database system designed to catalog films and their associated metadata for entertainment industry or consumer applications. The database stores detailed information about movies including cast and crew, categorization, multilingual content, and cross-references between films. It appears to support internationalization with multilingual abstracts, aliases, and job titles, suggesting use for a global movie information service or streaming platform.
    key_concepts:
        - Movies
        - People (Cast/Crew)
        - Categories/Genres
        - Multilingual Content
        - Job Roles
        - Movie References
        - Trailers
    temporal_model:
        note: reference-data
    known_gotchas:
        - movie_keywords table references category_id suggesting categories and keywords may be conflated
        - Separate abstract tables by language (movie_abstracts_*) indicates potential denormalization rather than using a single table with language column
        - access_log table has no primary key which is unusual for logging
        - casts table uses composite PK with 'position' suggesting multiple people can have same role on same movie
    provenance:
        source_type: llm_inferred
        confidence: 0.8
        human_reviewed: false
