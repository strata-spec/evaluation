            - '"Strings" narra la historia de Hal Tara, hijo de un rey, que emprende un largo viaje para vengar la muerte de su padre. En el camino, descubrirá la verdad sobre su propio pueblo y encontrará el amor, en lo que se convertirá en un viaje de descubrimiento y realización. '
