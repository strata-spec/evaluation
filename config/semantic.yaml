            - '"En tierra hostil" narra el intenso día a día de un comando especializado en desactivación de explosivos durante la guerra de Irak liderado por el sargento Thompson. Cuando éste fallece en el transcurso de una misión, la Unidad queda al mando del impredecible y temerario sargento James (Jeremy Renner).'
            - '"Everybody''s Fine" (Todos están bien) es una comedia dramática que nos cuenta una historia familiar muy común en nuestro mundo moderno. Padres y hermanos que viven a cientos de kilómetros, demasiado inmersos en el torbellino de la vida moderna para encontrar tiempo de llamarse, y demasiado preocupados por sus propias familias y amigos para encontrar tiempo de volver a casa.'
            - '"Garganta Profunda" está considerada la película porno clásica que sacó al género de su marginalidad y suscitó un amplio debate público. También es una película de bajo presupuesto que logró la mayor recaudación en taquilla de la historia del cine. En 2005 se estrenó un documental llamado "Inside Deep Throat" que revela los antecedentes del clásico del porno.'
            - '"Hacia rutas salvajes", de Sean Penn, está basada en una historia real y cuenta la historia del joven Alex (Emile Hirsch) que, alejado de sus padres y de la civilización en general, abandona todas sus posesiones y lo deja todo atrás para embarcarse en un largo viaje a través de Estados Unidos, que finalmente termina en Alaska...'
            - '"Harry el Sucio" es una película policíaca estadounidense dirigida por Don Siegel y protagonizada por Clint Eastwood en el papel de un policía rebelde a la caza de un despiadado asesino en serie. La película fue uno de los largometrajes de más éxito de principios de los años setenta e inició toda una serie de películas en torno al personaje de "Harry el Sucio".'
            - '"Historias de San Valentín" es una comedia romántica de enredo que cuenta cómo la vida de diez personas se cruzan en cinco historias durante el día de San Valentín en las calles de Los Ángeles. '
