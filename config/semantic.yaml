            - ' "Nueve Reinas" comienza una madrugada y termina a la mañana del día siguiente. Juan y Marcos, sus protagonistas, son dos estafadores de poca monta que se conocen casualmente una madrugada. En esas 24 horas van a vivir la experiencia de sus vidas. De ser completos desconocidos pasarán a asociarse para una gran estafa, en la que intentarán vender las Nueve Reinas, unas estampitas de gran valor.'
            - ' Controvertida (y parcialmente indexada) película de terror francesa de Alexandre Aja por su brutalidad explícita. Dos estudiantes van al campo para preparar sus exámenes, pero allí les espera un peligroso psicópata. '
            - '"...reitet für Deutschland" es una película de propaganda sobre la Alemania resurgida tras la Primera Guerra Mundial. Representando a Alemania está el Rittmeister Ernst von Brenken, que regresa a su finca tras la Primera Guerra Mundial gravemente herido y paralítico. Sin embargo, con una disciplina férrea y un duro entrenamiento, pronto consigue volver a celebrar victorias como jinete de torneos.'
            - '"Agárralo como puedas" (en Hispanoamérica: ¿Dónde está el policía?) es una comedia cinematográfica del director David Zucker, cuyo héroe principal es un policía enloquecido que llama la atención por sus métodos de investigación muy poco convencionales y que sólo resuelve el caso gracias a una inusual cadena de circunstancias. La película es la primera parte de una trilogía con el mismo nombre.'
            - '"Amanecer de los muertos" (Título original: "Dawn of the Dead") es un remake de terror de la película homónima de zombis de 1978 del director George A. Romero. Un grupo de personas se refugia en un centro comercial de los zombis que se están extendiendo rápidamente por todo el mundo.'
            - '"Amores locos" es una historia de amor, extrema y poco frecuente. Julia, una joven cuidadora del Museo del Prado, está convencida de que ella aparece en una pintura flamenca que figura en la sala en que trabaja, junto a un hombre que dice es su amante. '
            - '"Aquellos maravillosos años" es una serie tragicómica estadounidense: se centra en la infancia y adolescencia del protagonista Kevin Arnold y sus amigos en un suburbio sin nombre de California a finales de los 60 y principios de los 70. Las historias son comentadas retrospectivamente por el Kevin adulto como narrador en off.'
            - '"Bright Star" cuenta la historia de amor que, a principios del siglo XIX vivieron el poeta inglés John Keats y su vecina, la extrovertida y elegante estudiante Fanny Brawne. A pesar de sus diferencias, y de que empezó clandestinamente, el intenso romance duró tres años, pero se vio trágicamente interrumpido por la muerte del poeta. '
            - '"Cinema Paradiso" es una historia sobre el cine y su magia, sobre el poder de sus imágenes. En un pequeño pueblo de Sicilia, el cine es la única distracción. El pequeño Toto, fascinado por las películas, le pide a Alfredo, el proyeccionista, que le enseñe los entresijos de la profesión. Así nace una profunda amistad, que durará hasta que Toto debe dejar el pueblo y comenzar a buscar sus sueños. '
            - '"El Cebo" se realizó a partir de un guión del dramaturgo Dürenmatt en una producción germano-suiza. La película narra la búsqueda de un asesino de niños por parte de un detective. El papel protagonista lo interpreta el actor alemán Heinz Rühmann.'
            - '"El Juicio de Nuremberg" es una película estadounidense basada en los Juicios de Nuremberg del 20 de noviembre de 1945.'
            - '"El Rey de la Muerte" habla de la naturaleza cotidiana de la muerte, aquí en forma de parábola con siete episodios, cada uno de los cuales simboliza un día de la semana. Lo que une a estos episodios es que los protagonistas se matan violentamente a sí mismos u otros a través de la aparición del "Rey de la Muerte".'
